name: Daily Market Report

on:
  schedule:
    # 北京时间 15:35（UTC 07:35），周一至周五
    - cron: '35 7 * * 1-5'
  workflow_dispatch:
    inputs:
      notify:
        description: '推送到 IM（钉钉/飞书/企业微信）'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NOTIFY_FORMAT: html

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily report (MD + HTML)
        env:
          TZ: Asia/Shanghai
          SKIP_WEEKEND: 'true'
        run: npm run report:daily -- --out-dir reports

      - name: Commit reports for HTML preview link
        if: github.event_name == 'schedule' || inputs.notify == true
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          shopt -s nullglob
          files=(reports/YXStock_行情日报_*.html reports/YXStock_行情日报_*.md)
          if [ ${#files[@]} -eq 0 ]; then
            echo "未找到 reports 下的日报文件，跳过 commit"
            exit 1
          fi
          git add -f "${files[@]}"
          if git diff --staged --quiet; then
            echo "日报无变更，跳过 commit"
          else
            git commit -m "chore(reports): daily market report $(date +%Y-%m-%d)"
            git push
          fi

      - name: Push HTML report link to IM
        if: github.event_name == 'schedule' || inputs.notify == true
        env:
          TZ: Asia/Shanghai
          NOTIFY_FORMAT: html
          REPORT_USE_GITHUB_RAW: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DINGTALK_KEYWORD: ${{ secrets.DINGTALK_KEYWORD }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
          NOTIFY_CHANNELS: ${{ secrets.NOTIFY_CHANNELS }}
          REPORT_HTML_BASE_URL: ${{ secrets.REPORT_HTML_BASE_URL }}
          REPORT_HTML_URL: ${{ secrets.REPORT_HTML_URL }}
        run: npm run report:daily -- --out-dir reports --notify-only

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: reports/YXStock_行情日报_*.md
          retention-days: 90
          if-no-files-found: error

      - name: Upload HTML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-html-${{ github.run_number }}
          path: reports/YXStock_行情日报_*.html
          retention-days: 90
          if-no-files-found: error
