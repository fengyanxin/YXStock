name: Daily Market Report

on:
  schedule:
    # 北京时间 15:35（UTC 07:35），周一至周五
    - cron: '35 7 * * 1-5'
  workflow_dispatch:
    inputs:
      notify:
        description: '推送到 IM（钉钉/飞书/企业微信）'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate report and push to IM
        env:
          TZ: Asia/Shanghai
          SKIP_WEEKEND: 'true'
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          DINGTALK_KEYWORD: ${{ secrets.DINGTALK_KEYWORD }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
          NOTIFY_CHANNELS: ${{ secrets.NOTIFY_CHANNELS }}
          REPORT_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          NOTIFY_FLAG=""
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.notify }}" == "true" ]]; then
            NOTIFY_FLAG="--notify"
          fi
          npm run report:daily -- --out-dir reports $NOTIFY_FLAG

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: reports/YXStock_行情日报_*.md
          retention-days: 90
          if-no-files-found: error

      - name: Upload HTML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-html-${{ github.run_number }}
          path: reports/YXStock_行情日报_*.html
          retention-days: 90
          if-no-files-found: error

      - name: Commit reports to repo (optional)
        if: vars.COMMIT_DAILY_REPORTS == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: daily market report $(date +%Y-%m-%d)"
          git push
